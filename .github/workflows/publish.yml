name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC publishing (no token/secret needed)
    steps:
      - uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test
        run: deno task test

      - name: Check whether this version is already on JSR
        id: guard
        run: |
          NAME=$(jq -r .name deno.json)
          VERSION=$(jq -r .version deno.json)
          META=$(curl -fsSL "https://jsr.io/${NAME}/meta.json" || echo '{}')
          if [ "$(echo "$META" | jq -r --arg v "$VERSION" '(.versions // {}) | has($v)')" = "true" ]; then
            echo "$NAME@$VERSION is already published — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NAME@$VERSION is new — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.guard.outputs.publish == 'true'
        run: npx jsr publish
